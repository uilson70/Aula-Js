<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Interativo</title>
    <link rel="stylesheet" href="./stile.css">  
</head>
<body>
    <div class="container">
        <h1>Contador digital</h1>
        <button id="btnTema">🌙 Tema</button>
       
       <p class="Contador">Contador</p>
       <p id="status">zero</p>
        <div class="contador-box">
           
            <p> <span id="valor">0</span></p>
        </div>
        
        <div class="botoes">
            <button id="btnMenos">-</button>
            <button id="btnReset">Reset</button>
            <button id="btnMais">+</button>
        </div>
        
        <div class="input-area">
            <input type="number" id="inputValor" placeholder="Digite um valor">
            <button id="btnDefinir">Definir</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
